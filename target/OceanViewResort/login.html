<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean View Resort | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f4c75 0%, #1b6ca8 50%, #16a085 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            display: flex;
            width: 850px;
            min-height: 480px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }

        /* Left panel */
        .login-branding {
            flex: 1;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            color: white;
            text-align: center;
        }

        .login-branding .hotel-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-branding h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .login-branding p {
            font-size: 14px;
            opacity: 0.85;
            line-height: 1.6;
        }

        .login-branding .divider {
            width: 50px;
            height: 3px;
            background: rgba(255,255,255,0.5);
            border-radius: 2px;
            margin: 18px auto;
        }

        .login-branding .tagline {
            font-size: 12px;
            opacity: 0.7;
            font-style: italic;
        }

        /* Right panel - form */
        .login-form-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 45px;
        }

        .login-form-panel h2 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .login-form-panel .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 7px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1b6ca8;
            box-shadow: 0 0 0 3px rgba(27,108,168,0.12);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #0f4c75, #1b6ca8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(27,108,168,0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Error messages */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-warning {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fde68a;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    <!-- Left Branding Panel -->
    <div class="login-branding">
        <div class="hotel-icon">🏨</div>
        <h1>Ocean View Resort</h1>
        <div class="divider"></div>
        <p>Galle, Sri Lanka</p>
        <br>
        <p>Room Reservation<br>Management System</p>
        <br>
        <p class="tagline">"Where the ocean meets luxury"</p>
    </div>

    <!-- Right Form Panel -->
    <div class="login-form-panel">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to access the reservation system</p>

        <!-- Error Messages -->
        <div id="errorMsg" class="alert alert-error" style="display:none;"></div>

        <!-- Login Form -->
        <form id="loginForm" action="login" method="POST">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter your username"
                       autocomplete="username" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter your password"
                       autocomplete="current-password" required />
            </div>

            <button type="submit" class="btn-login">Sign In</button>

        </form>

        <p class="footer-note">© 2025 Ocean View Resort. All rights reserved.</p>
    </div>

</div>

<script>
    // Read error parameter from URL and show appropriate message
    const params = new URLSearchParams(window.location.search);
    const error  = params.get('error');
    const msgBox = document.getElementById('errorMsg');

    if (error === 'invalid') {
        msgBox.textContent = '⚠ Invalid username or password. Please try again.';
        msgBox.style.display = 'flex';
    } else if (error === 'empty') {
        msgBox.textContent = '⚠ Please enter both username and password.';
        msgBox.style.display = 'flex';
    } else if (error === 'session') {
        msgBox.className = 'alert alert-warning';
        msgBox.textContent = '⚠ Your session has expired. Please log in again.';
        msgBox.style.display = 'flex';
    }
</script>

</body>
</html>
